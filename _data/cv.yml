          - Developed Kalman filter and deep learning models to replace the computationally expensive stage of track reconstruction in the LHCb experiment at CERN.

    Research:
      - name: Clinical Deterioration of Hospitalized Children
        start_date: 2024-08
        end_date: Present
        summary: >
          Formulated clinical intervention planning as a POMDP and developed a
          neural index policy for multi-action restless bandits with
          heterogeneous resource constraints. Built an end-to-end differentiable
          optimization pipeline combining neural index prediction with a
          Sinkhorn-relaxed knapsack (optimal transport) layer to enforce
          per-timestep budgets. Trained via decision-focused learning to match
          LP-derived occupancy-measure upper bounds, achieving near-oracle
          performance (≤5% reward gap) and strong generalization to unseen arms.

      - name: Resource Allocation in Baseline Testing
        start_date: 2025-08
        end_date: Present
        summary: >
          Designing baseline tests for concussion diagnosis by modeling the
          problem as a sequential knapsack. Developing a predictive model to
          determine optimal baseline tests based on demographic factors.

      - name: "Newtonian Intuition: Learning Physical Dynamics from Video"
        start_date: 2025-08
        end_date: 2025-12
        summary: >
          Trained a vision-language LLM to learn physical reasoning and causal
          inference from video using SFT and RL-based post-training (GRPO).
          Identified fundamental limitations of token-based LLMs for continuous
          value prediction — the regression-via-text bottleneck.

      - name: Time-Constrained Concussion Diagnosis
        start_date: 2023-01
        end_date: 2025-02
        summary: >
          Developed a concussion assessment tool that reduced evaluation time by
          90% with an AUC > 0.93 by formulating it as a logistic regression with
          chance constraints, implemented as a mixed-integer program and solved
          with Gurobi. Engineered a data cleaning pipeline for a class-imbalanced
          dataset of 47,000+ athletes with 200 features using boosted Random
          Forests for missing-data imputation and undersampling for class balance.

      - name: Value of Baseline Testing
        start_date: 2023-05
        end_date: 2024-05
        summary: >
          Developed the Diagnostic Utility of Baseline testing (DUB) metric to
          quantify the added value of baseline testing in concussion diagnosis
          across athlete populations, identifying demographics that benefit or
          are disadvantaged by baseline testing.

